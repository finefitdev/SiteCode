<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life in Weeks — FINEFIT</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cormorant+Garamond:ital,wght@1,300&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --deep:   #060e07;
  --canopy: #132016;
  --moss:   #1e3320;
  --fern:   #2a4a2d;
  --sage:   #4a7c52;
  --mint:   #7ab87f;
  --glow:   #a8d5a2;
  --mist:   #b8c9b4;
  --cream:  #e8ddc8;
  --FD: 'Cinzel', serif;
  --FB: 'Cormorant Garamond', serif;
  --FL: 'Josefin Sans', sans-serif;
}

html, body {
  background: var(--deep);
  color: var(--cream);
  font-family: var(--FL);
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: var(--sage); }

#pc {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; opacity: 0.55;
}

.page {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center;
  padding-bottom: 2rem;
}

/* ── TOP ── */
.topbar {
  width: 100%; padding: 1rem 1rem 0;
  text-align: center;
}
.brand {
  font-family: var(--FD);
  font-size: 0.55rem; letter-spacing: 0.55em;
  color: var(--sage); display: block; margin-bottom: 0.15rem;
}
.page-title {
  font-family: var(--FD);
  font-size: clamp(1.3rem, 6vw, 2.2rem);
  font-weight: 900; letter-spacing: 0.14em;
  background: linear-gradient(150deg, var(--cream) 0%, var(--glow) 60%, var(--mint) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.05;
}

/* ── INPUT ── */
.input-wrap {
  width: 100%; padding: 0.7rem 1rem 0.4rem;
  display: flex; align-items: center;
  justify-content: center; gap: 0.5rem;
}
input[type="date"] {
  background: rgba(19,32,22,0.9);
  border: 1px solid rgba(122,184,127,0.35);
  color: var(--cream);
  font-family: var(--FL);
  font-size: 0.68rem; letter-spacing: 0.06em;
  padding: 0.5rem 0.75rem;
  outline: none;
  transition: border-color 0.3s;
  -webkit-appearance: none; border-radius: 0;
  max-width: 160px;
}
input[type="date"]:focus { border-color: var(--mint); }
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.55) sepia(1) hue-rotate(80deg);
}
.go-btn {
  padding: 0.5rem 1rem;
  font-family: var(--FL);
  font-size: 0.58rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--glow);
  background: rgba(30,51,32,0.6);
  border: 1px solid rgba(122,184,127,0.4);
  position: relative; overflow: hidden;
  transition: border-color 0.25s, color 0.25s;
  white-space: nowrap; cursor: pointer;
}
.go-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(42,74,45,0.65);
  transform: translateX(-100%); transition: transform 0.3s;
}
.go-btn:hover::before { transform: translateX(0); }
.go-btn:hover { border-color: var(--mint); color: var(--cream); }
.go-btn span { position: relative; z-index: 1; }

/* ── STATS ── */
.stats {
  width: 100%;
  display: flex;
  border-top: 1px solid rgba(122,184,127,0.1);
  border-bottom: 1px solid rgba(122,184,127,0.1);
  background: rgba(13,26,15,0.55);
}
.stat {
  flex: 1; padding: 0.55rem 0.3rem;
  display: flex; flex-direction: column;
  align-items: center; gap: 0.08rem;
  border-right: 1px solid rgba(122,184,127,0.07);
}
.stat:last-child { border-right: none; }
.sv {
  font-family: var(--FD);
  font-size: clamp(0.7rem, 2.8vw, 1rem);
  color: var(--mint); font-weight: 700;
  letter-spacing: 0.02em; line-height: 1;
}
.sk {
  font-size: clamp(0.3rem, 1.1vw, 0.38rem);
  letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--sage);
  text-align: center;
}

/* ── PROGRESS ── */
.prog-track {
  width: 100%; height: 2px;
  background: rgba(122,184,127,0.07);
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sage), var(--mint), var(--glow));
  width: 0%; transition: width 1.4s cubic-bezier(0.25,0.46,0.45,0.94);
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute; right: -3px; top: -3px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--glow); box-shadow: 0 0 8px var(--mint);
}

/* ── LEGEND ── */
.legend {
  width: 100%; padding: 0.4rem 0.8rem;
  display: flex; gap: 1rem; justify-content: flex-end; align-items: center;
}
.li {
  display: flex; align-items: center; gap: 0.3rem;
  font-size: clamp(0.34rem, 1.1vw, 0.42rem);
  letter-spacing: 0.13em; text-transform: uppercase; color: var(--sage);
}
.ld {
  width: 7px; height: 7px;
  border: 1px solid rgba(122,184,127,0.25); flex-shrink: 0;
}
.ld.lived  { background: rgba(122,184,127,0.65); border-color: var(--mint); }
.ld.now    { background: var(--glow); border-color: var(--cream); box-shadow: 0 0 5px var(--glow); }
.ld.future { background: rgba(19,32,22,0.5); }

/* ── GRID ── */
.grid-outer {
  width: 100%;
  padding: 0 0.4rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.week-cell {
  border: 1px solid rgba(42,74,45,0.28);
  background: rgba(13,26,15,0.4);
}
.week-cell.lived {
  background: rgba(74,124,82,0.52);
  border-color: rgba(122,184,127,0.4);
}
.week-cell.now {
  background: var(--glow) !important;
  border-color: var(--cream) !important;
  animation: nowP 2.5s ease-in-out infinite;
}
@keyframes nowP {
  0%,100% { box-shadow: 0 0 5px rgba(168,213,162,0.7); }
  50%      { box-shadow: 0 0 12px rgba(168,213,162,1); }
}
.week-cell.beyond {
  background: rgba(13,26,15,0.15);
  border-color: rgba(42,74,45,0.1);
}

/* ── TOOLTIP ── */
.tip {
  position: fixed;
  background: rgba(8,18,10,0.96);
  border: 1px solid rgba(122,184,127,0.28);
  padding: 0.3rem 0.6rem;
  font-size: 0.46rem; letter-spacing: 0.1em;
  color: var(--mist); pointer-events: none;
  z-index: 500; white-space: nowrap; display: none;
}

/* ── QUOTE ── */
.quote {
  padding: 1.2rem 1.5rem 0.5rem;
  font-family: var(--FB);
  font-style: italic;
  font-size: clamp(0.82rem, 2.5vw, 1rem);
  color: var(--sage); text-align: center;
  max-width: 380px; line-height: 1.6; margin: 0 auto;
}
</style>
</head>
<body>
<canvas id="pc"></canvas>
<div class="tip" id="tip"></div>

<div class="page">

  <div class="topbar">
    <span class="brand">FINEFIT</span>
    <h1 class="page-title">LIFE IN WEEKS</h1>
  </div>

  <div class="input-wrap">
    <input type="date" id="dob" value="2004-10-05">
    <button class="go-btn" onclick="go()"><span>View →</span></button>
  </div>

  <div class="stats">
    <div class="stat"><span class="sv" id="sAge">—</span><span class="sk">Age</span></div>
    <div class="stat"><span class="sv" id="sLived">—</span><span class="sk">Weeks Lived</span></div>
    <div class="stat"><span class="sv" id="sLeft">—</span><span class="sk">Remaining</span></div>
    <div class="stat"><span class="sv" id="sPct">—</span><span class="sk">Complete</span></div>
  </div>

  <div class="prog-track"><div class="prog-fill" id="pf"></div></div>

  <div class="legend">
    <div class="li"><div class="ld lived"></div>Lived</div>
    <div class="li"><div class="ld now"></div>Now</div>
    <div class="li"><div class="ld future"></div>Ahead</div>
  </div>

  <div class="grid-outer"><div id="gw"></div></div>

  <p class="quote" id="qt">"Every box is one week of your one life."</p>

</div>

<script>
/* ── PARTICLES ── */
const cv = document.getElementById('pc'), cx = cv.getContext('2d');
let W, H, pts = [];
function rsz() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
rsz(); addEventListener('resize', () => { rsz(); go(); });
function mkP() {
  return { x:Math.random()*W, y:H+5, s:Math.random()*1.1+0.3,
           sp:Math.random()*0.35+0.12, dr:(Math.random()-.5)*0.22,
           op:Math.random()*0.4+0.15, l:0, ml:Math.random()*500+200 };
}
for(let i=0;i<35;i++){const p=mkP();p.y=Math.random()*H;p.l=Math.random()*p.ml;pts.push(p);}
(function tick(){
  cx.clearRect(0,0,W,H);
  pts.forEach((p,i)=>{
    p.y-=p.sp; p.x+=p.dr; p.l++;
    const a=p.l<40?p.l/40*p.op:p.l>p.ml-40?(p.ml-p.l)/40*p.op:p.op;
    cx.beginPath(); cx.arc(p.x,p.y,p.s,0,Math.PI*2);
    cx.fillStyle=`rgba(168,213,162,${a})`; cx.fill();
    if(p.l>=p.ml) pts[i]=mkP();
  });
  requestAnimationFrame(tick);
})();

/* ── CONSTANTS ── */
const YEARS=90, WPY=52, LIFE=80, LWKS=LIFE*WPY;

/* ── INIT ── */
const dobEl = document.getElementById('dob');
dobEl.max = new Date().toISOString().split('T')[0];
dobEl.addEventListener('change', go);

/* ── MAIN ── */
function go() {
  const v = dobEl.value; if (!v) return;
  const bd = new Date(v+'T00:00:00'), now = new Date();
  if (bd > now) return;

  const MS = 7*24*60*60*1000;
  const wL = Math.floor((now - bd) / MS);
  const wR = Math.max(0, LWKS - wL);
  const pct = Math.min(100, wL/LWKS*100);

  let age = now.getFullYear()-bd.getFullYear();
  if(now.getMonth()<bd.getMonth()||(now.getMonth()===bd.getMonth()&&now.getDate()<bd.getDate())) age--;

  document.getElementById('sAge').textContent   = age+'y';
  document.getElementById('sLived').textContent = wL.toLocaleString();
  document.getElementById('sLeft').textContent  = wR.toLocaleString();
  document.getElementById('sPct').textContent   = pct.toFixed(1)+'%';

  // Reset then animate progress
  const pf = document.getElementById('pf');
  pf.style.transition = 'none'; pf.style.width = '0%';
  setTimeout(()=>{ pf.style.transition='width 1.4s cubic-bezier(0.25,0.46,0.45,0.94)'; pf.style.width=pct+'%'; }, 60);

  const qs = [
    `"${wR.toLocaleString()} weeks remain. Make them count."`,
    `"You have lived ${wL.toLocaleString()} weeks of your one life."`,
    `"${pct.toFixed(1)}% complete. The path continues."`,
    `"${age} years of seasons. How many have you truly felt?"`,
  ];
  document.getElementById('qt').textContent = qs[Math.floor(Math.random()*qs.length)];

  buildGrid(wL, bd);
}

/* ── BUILD GRID ── */
function buildGrid(wLived, bd) {
  const wrap = document.getElementById('gw');
  wrap.innerHTML = '';

  // Compute cell size to fit screen width exactly
  const outerEl = document.querySelector('.grid-outer');
  const avail = outerEl.clientWidth - 8; // minus padding
  const lw  = 20; // year label col width
  const gap = 1;
  const cellW = Math.max(3, Math.floor((avail - lw - (WPY-1)*gap) / WPY));
  const cellH = Math.max(3, Math.round(cellW * 0.75));

  const outer = document.createElement('div');
  outer.style.cssText = 'display:flex;';
  wrap.appendChild(outer);

  // Year labels
  const yCol = document.createElement('div');
  yCol.style.cssText = `width:${lw}px; flex-shrink:0; display:flex; flex-direction:column;`;
  outer.appendChild(yCol);

  // Grid
  const grid = document.createElement('div');
  grid.style.cssText = `display:grid; grid-template-columns:repeat(${WPY},${cellW}px); gap:${gap}px;`;
  outer.appendChild(grid);

  const tip = document.getElementById('tip');

  for (let y=0; y<YEARS; y++) {
    const lbl = document.createElement('div');
    lbl.style.cssText = `height:${cellH+gap}px; display:flex; align-items:center; justify-content:flex-end; padding-right:2px; font-family:'Josefin Sans',sans-serif; font-size:${Math.max(5,Math.min(cellW*0.6,8))}px; color:rgba(74,124,82,${y<LIFE?'0.48':'0.15'}); white-space:nowrap;`;
    lbl.textContent = (y%10===0) ? y : '';
    yCol.appendChild(lbl);

    for (let w=0; w<WPY; w++) {
      const idx = y*WPY + w;
      const cell = document.createElement('div');
      cell.className = 'week-cell';
      cell.style.cssText = `width:${cellW}px; height:${cellH}px;`;

      if (idx === wLived)     cell.classList.add('now');
      else if (idx < wLived)  cell.classList.add('lived');
      else if (idx >= LWKS)   cell.classList.add('beyond');

      if (idx === LWKS-1) cell.style.borderRight = '2px solid rgba(200,169,110,0.4)';

      // Tooltip
      const wd = new Date(bd.getTime() + idx*7*24*60*60*1000);
      const lbl2 = `Yr ${y+1} · Wk ${w+1} · ${wd.toLocaleDateString('en-US',{month:'short',year:'numeric'})}`;

      const showTip = e => {
        const ex = e.touches?e.touches[0].clientX:e.clientX;
        const ey = e.touches?e.touches[0].clientY:e.clientY;
        tip.style.display='block';
        tip.textContent=lbl2;
        tip.style.left=Math.min(ex+10, innerWidth-140)+'px';
        tip.style.top=(ey-34)+'px';
      };
      cell.addEventListener('mousemove', showTip);
      cell.addEventListener('touchstart', showTip, {passive:true});
      cell.addEventListener('mouseleave', ()=>tip.style.display='none');
      cell.addEventListener('touchend', ()=>setTimeout(()=>tip.style.display='none',900));

      grid.appendChild(cell);
    }
  }

  // Staggered fade in
  const cells = grid.querySelectorAll('.week-cell');
  cells.forEach((c,i)=>{
    c.style.opacity='0';
    c.style.transition=`opacity 0.3s ease ${Math.min(i*0.00045,0.38)}s`;
    requestAnimationFrame(()=>{ c.style.opacity='1'; });
  });
}

// Auto-render on load
window.addEventListener('load', go);
</script>
</body>
</html>
