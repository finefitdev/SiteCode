<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finefit</title>
  <meta name="description" content="Finefit — developer portfolio. Projects, socials, games." />
  <meta property="og:title" content="Finefit">
  <meta property="og:description" content="Self-taught developer portfolio, projects, socials, and games.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://finefit.dev">
  <meta property="og:image" content="https://finefit.dev/banner.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Finefit">
  <meta name="twitter:description" content="Self-taught developer portfolio, projects, socials, and games.">
  <meta name="twitter:image" content="https://finefit.dev/banner.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;700;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #050505;
      --bg-2: #0a0a0a;
      --fg: #ffffff;
      --dim: rgba(255, 255, 255, 0.55);
      --dimmer: rgba(255, 255, 255, 0.22);
      --line: rgba(255, 255, 255, 0.08);
      --line-2: rgba(255, 255, 255, 0.16);
      --glow: 0 0 16px rgba(255, 255, 255, 0.45);
      --glow-soft: 0 0 8px rgba(255, 255, 255, 0.3);
      --cursor-x: 50%;
      --cursor-y: 50%;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(circle 600px at var(--cursor-x) var(--cursor-y), rgba(255, 255, 255, 0.035), transparent 60%),
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255, 255, 255, 0.04), transparent 60%),
        radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255, 255, 255, 0.025), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      min-height: 100vh;
      position: relative;
    }

    /* Scanlines + vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.012) 2px, rgba(255, 255, 255, 0.012) 3px);
      pointer-events: none;
      z-index: 1;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    ::selection {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      text-shadow: var(--glow);
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      z-index: 100;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(5, 5, 5, 0.55);
      border-bottom: 1px solid var(--line);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--fg);
      font-family: 'Unbounded', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.22em;
      text-shadow: var(--glow-soft);
      transition: text-shadow 0.3s ease, letter-spacing 0.3s ease;
    }

    .logo .mark {
      width: 10px;
      height: 10px;
      background: var(--fg);
      box-shadow: var(--glow);
      transform: rotate(45deg);
      transition: transform 0.4s ease;
    }

    .logo:hover {
      text-shadow: var(--glow);
      letter-spacing: 0.26em;
    }

    .logo:hover .mark {
      transform: rotate(225deg);
    }

    nav {
      display: flex;
      gap: 2.25rem;
    }

    nav a {
      color: var(--dim);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.25rem 0;
      position: relative;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    nav a::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 0;
      height: 1px;
      background: var(--fg);
      box-shadow: var(--glow-soft);
      transition: width 0.3s ease, left 0.3s ease;
    }

    nav a:hover,
    nav a.active {
      color: var(--fg);
      text-shadow: var(--glow-soft);
    }

    nav a:hover::after,
    nav a.active::after {
      width: 100%;
      left: 0;
    }

    main {
      padding-top: 4.5rem;
      min-height: 100vh;
      position: relative;
      z-index: 2;
    }

    .fade-in {
      animation: fadeIn 0.6s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Home */
    .home {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 4.5rem);
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    .home h1 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(4rem, 17vw, 15rem);
      letter-spacing: -0.045em;
      line-height: 0.9;
      text-shadow:
        0 0 30px rgba(255, 255, 255, 0.55),
        0 0 80px rgba(255, 255, 255, 0.3),
        0 0 140px rgba(255, 255, 255, 0.18);
      animation: pulse 5s ease-in-out infinite;
    }

    .home .sub {
      margin-top: 2.25rem;
      color: var(--fg);
      font-family: 'Unbounded', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.4vw, 1rem);
      letter-spacing: 0.05em;
      max-width: 38ch;
      line-height: 1.6;
      opacity: 0.85;
    }

    .home .tag {
      margin-top: 1.25rem;
      color: var(--dim);
      font-size: 0.72rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      padding-left: 0.45em;
    }

    .home .hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--dimmer);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.55), 0 0 80px rgba(255, 255, 255, 0.3), 0 0 140px rgba(255, 255, 255, 0.18);
      }

      50% {
        text-shadow: 0 0 45px rgba(255, 255, 255, 0.7), 0 0 110px rgba(255, 255, 255, 0.4), 0 0 180px rgba(255, 255, 255, 0.22);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.9;
      }
    }

    /* Page shell */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 5rem 2rem 6rem;
    }

    .page-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--dimmer);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .page-meta::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .page-title {
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: clamp(2.75rem, 7vw, 5.5rem);
      letter-spacing: -0.03em;
      text-shadow: var(--glow);
      margin-bottom: 1.5rem;
      line-height: 1;
    }

    .page-lede {
      max-width: 60ch;
      color: var(--dim);
      font-size: 0.85rem;
      line-height: 1.8;
      margin-bottom: 3.5rem;
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.015);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s ease, background 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
    }

    .project-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1), transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .project-card:hover {
      border-color: var(--line-2);
      background: rgba(255, 255, 255, 0.025);
      transform: translateY(-3px);
      box-shadow: var(--glow-soft);
    }

    .project-card:hover::before {
      opacity: 1;
    }

    /* Carousel */
    .carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--bg-2);
      margin-bottom: 1.25rem;
    }

    .carousel-track {
      width: 100%;
      height: 100%;
      display: flex;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
      flex: 0 0 100%;
      height: 100%;
      cursor: zoom-in;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.9);
      transition: filter 0.3s ease;
    }

    .carousel-slide:hover img {
      filter: brightness(1);
    }

    .carousel-nav {
      position: absolute;
      top: 50%;
      width: 32px;
      height: 32px;
      transform: translateY(-50%);
      background: rgba(5, 5, 5, 0.7);
      border: 1px solid var(--line-2);
      color: var(--fg);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .carousel-nav:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--fg);
    }

    .carousel-nav.prev {
      left: 0.5rem;
    }

    .carousel-nav.next {
      right: 0.5rem;
    }

    .carousel-counter {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.2rem 0.55rem;
      background: rgba(5, 5, 5, 0.7);
      border: 1px solid var(--line-2);
      backdrop-filter: blur(4px);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--dim);
    }

    .carousel-dots {
      position: absolute;
      bottom: 0.55rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.35rem;
    }

    .dot {
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.3);
      transition: background 0.25s ease, width 0.25s ease;
      cursor: pointer;
      border: 0;
      padding: 0;
    }

    .dot.active {
      background: var(--fg);
      box-shadow: var(--glow-soft);
      width: 14px;
    }

    /* Card body */
    .project-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }

    .project-num {
      font-size: 0.65rem;
      color: var(--dimmer);
      letter-spacing: 0.3em;
    }

    .project-period {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.18em;
    }

    .project-card h3 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 500;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.35rem;
    }

    .project-role {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.05em;
      margin-bottom: 0.85rem;
    }

    .project-desc {
      color: var(--dim);
      font-size: 0.8rem;
      line-height: 1.7;
      margin-bottom: 1.1rem;
      flex: 1;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.85rem;
    }

    .tag {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--line-2);
      background: rgba(255, 255, 255, 0.02);
    }

    .project-status {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: var(--dimmer);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--line);
    }

    .project-status::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--dim);
    }

    /* Modal */
    .image-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 2rem;
    }

    .image-modal.open {
      display: flex;
    }

    .image-modal img {
      max-width: 95vw;
      max-height: 90vh;
      border: 1px solid var(--line-2);
      box-shadow: var(--glow);
    }

    .modal-close {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      background: none;
      border: 1px solid var(--line-2);
      color: var(--fg);
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color 0.25s ease, background 0.25s ease;
    }

    .modal-close:hover {
      border-color: var(--fg);
      background: rgba(255, 255, 255, 0.05);
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line-2);
      color: var(--fg);
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      backdrop-filter: blur(4px);
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .modal-nav:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--fg);
    }

    .modal-nav.prev {
      left: 1.5rem;
    }

    .modal-nav.next {
      right: 1.5rem;
    }

    .modal-counter {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--dim);
      font-size: 0.72rem;
      letter-spacing: 0.25em;
    }

    /* Socials */
    .socials-list {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--line);
    }

    .social-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.75rem 0.5rem;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
      text-decoration: none;
      font-family: 'Unbounded', sans-serif;
      font-weight: 400;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      transition: padding 0.4s ease, background 0.4s ease, text-shadow 0.4s ease;
    }

    .social-link .name-wrap {
      display: inline-flex;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .social-link .handle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--dim);
      margin-left: 1rem;
      letter-spacing: 0.05em;
    }

    .social-link .arrow {
      font-size: 1.25rem;
      color: var(--dim);
      transition: transform 0.4s ease, color 0.4s ease, text-shadow 0.4s ease;
    }

    .social-link:hover {
      padding-left: 1.75rem;
      background: rgba(255, 255, 255, 0.02);
      text-shadow: var(--glow-soft);
    }

    .social-link:hover .arrow {
      transform: translateX(10px);
      color: var(--fg);
      text-shadow: var(--glow-soft);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 2.5rem;
      padding: 0.85rem 1rem;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.015);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      width: fit-content;
    }

    .status-bar .dot-live {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #5cf08e;
      box-shadow: 0 0 8px rgba(92, 240, 142, 0.7);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* Apps */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .app-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.015);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--fg);
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s ease, background 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1), transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .app-card:hover {
      border-color: var(--line-2);
      background: rgba(255, 255, 255, 0.025);
      transform: translateY(-3px);
      box-shadow: var(--glow-soft);
    }

    .app-card:hover::before {
      opacity: 1;
    }

    .app-cover {
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--bg-2);
      margin-bottom: 1.25rem;
      position: relative;
    }

    .app-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.9);
      transition: filter 0.3s ease;
    }

    .app-card:hover .app-cover img {
      filter: brightness(1);
    }

    .app-cover span {
      display: none;
    }

    .app-cover.placeholder {
      display: grid;
      place-items: center;
    }

    .app-cover.placeholder span {
      display: block;
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dimmer);
      text-shadow: var(--glow-soft);
      text-align: center;
      padding: 1rem;
    }

    .app-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .app-badge {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid var(--line-2);
      padding: 0.2rem 0.5rem;
      white-space: nowrap;
    }

    .app-badge.soon {
      color: #f0c85c;
      border-color: rgba(240, 200, 92, 0.4);
    }

    .app-badge.live {
      color: #5cf08e;
      border-color: rgba(92, 240, 142, 0.4);
    }

    .app-card h3 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 500;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.35rem;
    }

    .app-card .app-desc {
      color: var(--dim);
      font-size: 0.8rem;
      line-height: 1.7;
      margin-bottom: 1.1rem;
      flex: 1;
    }

    .app-card .project-tags {
      margin-bottom: 0.85rem;
    }

    .app-cta {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--line);
      transition: color 0.4s ease, text-shadow 0.4s ease;
    }

    .app-cta .arrow {
      transition: transform 0.4s ease;
    }

    .app-card:hover .app-cta {
      color: var(--fg);
      text-shadow: var(--glow-soft);
    }

    .app-card:hover .app-cta .arrow {
      transform: translateX(8px);
    }

    .app-cta.muted {
      color: var(--dimmer);
    }

    /* Home sections (scroll targets under fixed header) */
    .home-section {
      scroll-margin-top: 4.5rem;
      border-top: 1px solid var(--line);
    }

    .scroll-cue {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      background: none;
      border: 0;
      cursor: pointer;
      color: var(--dimmer);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .scroll-cue:hover {
      color: var(--fg);
      text-shadow: var(--glow-soft);
    }

    .scroll-cue .chev {
      font-size: 1rem;
      animation: bob 2s ease-in-out infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      50% {
        transform: translateY(5px);
        opacity: 1;
      }
    }

    /* Store */
    .store-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      padding: 0.85rem 1rem;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.015);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      width: fit-content;
    }

    .store-banner .dot-soon {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f0c85c;
      box-shadow: 0 0 8px rgba(240, 200, 92, 0.7);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .store-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.015);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--fg);
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s ease, background 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
    }

    .store-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1), transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .store-card:hover {
      border-color: var(--line-2);
      background: rgba(255, 255, 255, 0.025);
      transform: translateY(-3px);
      box-shadow: var(--glow-soft);
    }

    .store-card:hover::before {
      opacity: 1;
    }

    .store-card .store-kind {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dimmer);
      margin-bottom: 0.85rem;
    }

    .store-card h3 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 500;
      font-size: 1.3rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }

    .store-card .store-desc {
      color: var(--dim);
      font-size: 0.78rem;
      line-height: 1.7;
      margin-bottom: 1.25rem;
      flex: 1;
    }

    .store-card .store-cta {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--line);
      transition: color 0.4s ease, text-shadow 0.4s ease;
    }

    .store-card .store-cta .arrow {
      transition: transform 0.4s ease;
    }

    .store-card:hover .store-cta {
      color: var(--fg);
      text-shadow: var(--glow-soft);
    }

    .store-card:hover .store-cta .arrow {
      transform: translateX(8px);
    }

    .store-section-title {
      font-family: 'Unbounded', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
      text-shadow: var(--glow-soft);
      margin: 3.5rem 0 1.5rem;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--line);
    }

    .store-section-title:first-of-type {
      margin-top: 2.5rem;
    }

    .store-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--bg-2);
      margin-bottom: 1.25rem;
      display: grid;
      place-items: center;
    }

    .store-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.9);
      transition: filter 0.3s ease;
    }

    .store-card:hover .store-cover img {
      filter: brightness(1);
    }

    .store-cover .cover-label {
      display: none;
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dimmer);
      text-shadow: var(--glow-soft);
      text-align: center;
      padding: 1rem;
    }

    .store-cover.is-empty img {
      display: none;
    }

    .store-cover.is-empty .cover-label {
      display: block;
    }

    .cloth-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .color-chip {
      flex: 1 1 auto;
      text-align: center;
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line-2);
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, text-shadow 0.3s ease;
    }

    .color-chip:hover {
      color: var(--fg);
      border-color: var(--line-2);
    }

    .color-chip.active {
      color: var(--fg);
      border-color: var(--fg);
      box-shadow: var(--glow-soft);
      text-shadow: var(--glow-soft);
    }

    .cloth-sizes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
    }

    .size-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--fg);
      text-decoration: none;
      border: 1px solid var(--line-2);
      padding: 0.5rem 0.85rem;
      min-width: 2.6rem;
      text-align: center;
      transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, text-shadow 0.3s ease;
    }

    .size-btn:hover {
      border-color: var(--fg);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: var(--glow-soft);
      text-shadow: var(--glow-soft);
    }

    /* Responsive */
    @media (max-width: 700px) {
      header {
        padding: 0.9rem 1rem;
        gap: 0.75rem;
      }

      .logo {
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        flex-shrink: 0;
      }

      nav {
        gap: 1rem;
      }

      nav a {
        font-size: 0.62rem;
        letter-spacing: 0.1em;
      }

      .page {
        padding: 3.5rem 1.25rem 4rem;
      }

      .home .tag {
        font-size: 0.65rem;
        letter-spacing: 0.35em;
      }

      .social-link {
        font-size: 1.1rem;
        padding: 1.4rem 0.5rem;
      }

      .social-link .handle {
        display: block;
        margin-left: 0;
        font-size: 0.65rem;
        margin-top: 0.25rem;
      }

      .modal-nav.prev {
        left: 0.5rem;
      }

      .modal-nav.next {
        right: 0.5rem;
      }
    }

    @media (max-width: 440px) {
      header {
        padding: 0.8rem 0.85rem;
        gap: 0.5rem;
      }

      .logo {
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        gap: 0.4rem;
      }

      .logo .mark {
        width: 8px;
        height: 8px;
      }

      nav {
        gap: 0.7rem;
      }

      nav a {
        font-size: 0.58rem;
        letter-spacing: 0.04em;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="/" class="logo" data-link aria-label="Finefit home">
      <span class="mark"></span>
      <span>FINEFIT</span>
    </a>
    <nav id="nav">
      <a href="/#projects" data-scroll="projects">Projects</a>
      <a href="/#socials" data-scroll="socials">Socials</a>
      <a href="/apps" data-link>Apps</a>
      <a href="/store" data-link>Store</a>
    </nav>
  </header>

  <main id="content"></main>

  <div id="image-modal" class="image-modal">
    <button class="modal-close" aria-label="Close">×</button>
    <button class="modal-nav prev" aria-label="Previous">←</button>
    <img id="modal-image" src="" alt="">
    <button class="modal-nav next" aria-label="Next">→</button>
    <div class="modal-counter" id="modal-counter"></div>
  </div>

  <script>
    // ---------- Cursor spotlight ----------
    document.addEventListener('mousemove', (e) => {
      document.documentElement.style.setProperty('--cursor-x', e.clientX + 'px');
      document.documentElement.style.setProperty('--cursor-y', e.clientY + 'px');
    });

    // ---------- Data ----------
    const projects = [
      {
        num: '01',
        title: 'Datapacks',
        period: '2019',
        role: 'First public projects, age 15',
        desc: 'Three Minecraft datapacks released to the community. ~1,900 downloads total. My first taste of shipping something other people actually used.',
        tags: ['mcfunction', 'JSON', 'Minecraft'],
        images: ['images/datapack1.png', 'images/datapack2.png', 'images/datapack3.png'],
        status: '3 projects · ~1,900 downloads',
      },
      {
        num: '02',
        title: 'Plugins & Bots',
        period: '2020 – 2021',
        role: 'Server tooling and side projects',
        desc: 'Spigot plugins and Discord bots for small communities. Got serious about touch-typing on the side — 100+ WPM became routine.',
        tags: ['Java', 'Python', 'Discord.py'],
        images: ['images/plugin1.png', 'images/plugin2.png', 'images/plugin3.png'],
        status: 'Typing 100+ WPM',
      },
      {
        num: '03',

        period: '2022 – 2024',
        role: 'Working full-time, learning on the side',
        desc: 'Labor jobs paid the bills. Coding lived in evenings — picking up Python, writing small scripts, keeping the habit warm.',
        tags: ['Python'],
        images: ['images/gap1.png', 'images/gap2.png', 'images/gap3.png'],
        status: 'Intro to Python',
      },
    ];

    const socials = [
      { name: 'GitHub', handle: '@finefitdev', url: 'https://github.com/finefitdev' },
      { name: 'Email', handle: 'hello@finefit.dev', url: 'mailto:hello@finefit.dev' },
      { name: 'Discord', handle: 'finefit', url: 'https://discord.com/' },
    ];

    const CHECKOUT = 'https://finefit-shop.fourthwall.com/cart/checkout?products=';

    const stickers = [
      { title: 'Bass Xanthic', desc: 'Xanthic bass print. 3" × 3" sticker.', image: 'images/sticker-bass-xanthic.png', url: CHECKOUT + 'e06e04e4-9bfe-4b28-bfa2-591b0e28694b' },
      { title: 'Marsh Gar', desc: 'Marsh gar print. 3" × 3" sticker.', image: 'images/sticker-marsh-gar.png', url: CHECKOUT + 'ba1b882f-7254-47e8-a0ea-a3f0914ed3a0' },
      { title: 'Sunscale', desc: 'Sunscale print. 3" × 3" sticker.', image: 'images/sticker-sunscale.png', url: CHECKOUT + 'f33c2216-4ae9-4349-a94f-a1498dafd066' },
      { title: 'Rift Eel', desc: 'Rift eel print. 3" × 3" sticker.', image: 'images/sticker-rift-eel.png', url: CHECKOUT + '932975ac-9fc8-4f7f-a91a-e12ad37a9c1e' },
      { title: 'Carp Calico', desc: 'Calico carp print. 3" × 3" sticker.', image: 'images/sticker-carp-calico.png', url: CHECKOUT + 'b4ec499f-96ab-4546-b674-282b3afd29d4' },
    ];

    const clothing = [
      {
        title: 'One Last Cast Tee',
        desc: 'Soft cotton tee with the One Last Cast print. Pick a color and size to buy direct, or view every option on the product page.',
        productUrl: 'https://finefit-shop.fourthwall.com/products/one-last-cast-tee',
        colors: [
          {
            name: 'Black',
            image: 'images/tee-black.png',
            sizes: [
              ['S', CHECKOUT + 'eaecc5a0-1706-4879-bb27-d5198325a3a7'],
              ['M', CHECKOUT + '27b98161-f213-4e1b-865e-555e95800da8'],
              ['L', CHECKOUT + '309e83da-8dae-4593-bcbe-4d60070be118'],
              ['XL', CHECKOUT + '7bec3673-9cce-4228-90d0-3aa10cb842ce'],
            ],
          },
          {
            name: 'Navy',
            image: 'images/tee-navy.png',
            sizes: [
              ['S', CHECKOUT + 'baf74a9b-442d-46ec-97d2-a864713464ca'],
              ['M', CHECKOUT + '6f65ce81-9058-4110-a928-e8d6ce1b941f'],
              ['L', CHECKOUT + 'a26dee5b-33bc-452d-b73d-ee722e2a1ef8'],
              ['XL', CHECKOUT + '91e836b9-428b-422c-acc1-67781a34b7bf'],
            ],
          },
        ],
      },
    ];

    const apps = [
      {
        title: 'One Last Cast',
        badge: 'In Development',
        badgeClass: 'soon',
        desc: 'A mobile fishing roguelike built in Godot. Cast, hook, and fight your catch — chase rarer fish and push your luck for one last cast each run.',
        tags: ['Godot 4', 'GDScript', 'Mobile'],
        image: 'images/one-last-cast.png',
        url: null,
        cta: 'Coming Soon',
      },
      {
        title: 'SpeakMyChat',
        badge: 'Open Source',
        badgeClass: 'live',
        desc: 'Reads your Twitch chat out loud — type a channel, hit Connect, done. No login, no token, no setup. Piper TTS voices, keyword sound triggers, and content filtering all built in.',
        tags: ['Python', 'Piper TTS', 'Twitch'],
        image: 'https://raw.githubusercontent.com/finefitdev/SpeakMyChat/main/example/example1.png',
        url: 'https://github.com/finefitdev/SpeakMyChat',
        cta: 'View on GitHub',
      },
    ];

    // Per-project carousel state
    const carouselIdx = {};

    // ---------- Routing ----------
    const routes = {
      '/': (root) => renderHome(root),
      '/projects': (root) => renderHome(root, 'projects'),
      '/socials': (root) => renderHome(root, 'socials'),
      '/apps': renderApps,
      '/games': renderApps,
      '/store': renderStore,
    };

    const getPath = () => window.location.pathname || '/';

    function navigate(path) {
      if (getPath() === path) return;
      teardown();
      try { history.pushState({ path }, '', path); }
      catch { window.__finefitPath = path; }
      render(path);
    }

    window.addEventListener('popstate', () => render(getPath()));

    document.addEventListener('click', (e) => {
      const scrollLink = e.target.closest('[data-scroll]');
      if (scrollLink) {
        e.preventDefault();
        goToSection(scrollLink.getAttribute('data-scroll'));
        return;
      }
      const a = e.target.closest('a[data-link]');
      if (!a) return;
      e.preventDefault();
      navigate(a.getAttribute('href'));
    });

    function scrollToSection(id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function goToSection(id) {
      if (getPath() === '/' || getPath() === '/projects' || getPath() === '/socials') {
        scrollToSection(id);
      } else {
        navigate('/');
        requestAnimationFrame(() => requestAnimationFrame(() => scrollToSection(id)));
      }
    }

    function render(path) {
      path = path || window.__finefitPath || getPath();
      const handler = routes[path] || render404;
      const main = document.getElementById('content');
      main.classList.remove('fade-in');
      void main.offsetWidth;
      handler(main);
      main.classList.add('fade-in');

      document.querySelectorAll('#nav a').forEach((a) => {
        a.classList.toggle('active', a.getAttribute('href') === path);
      });
      const titles = {
        '/': 'Finefit',
        '/projects': 'Projects · Finefit',
        '/socials': 'Socials · Finefit',
        '/apps': 'Apps · Finefit',
        '/games': 'Apps · Finefit',
        '/store': 'Store · Finefit',
      };
      document.title = titles[path] || 'Finefit';
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    function teardown() {
      if (window._spy?.disconnect) { window._spy.disconnect(); window._spy = null; }
    }

    // ---------- Pages ----------
    function renderHome(root, scrollTarget) {
      root.innerHTML = `
        <section class="home">
          <h1>Welcome</h1>
          <p class="sub">Self-taught developer. Shipping code since 2019, working with what I can teach myself.</p>
          <p class="tag">Look around</p>
          <button class="scroll-cue" data-scroll="projects" aria-label="Scroll to projects">
            <span>Scroll</span>
            <span class="chev">▼</span>
          </button>
        </section>
        ${projectsSection()}
        ${socialsSection()}
      `;
      projects.forEach((_, i) => (carouselIdx[i] = 0));
      bindCarousels();
      initScrollSpy();
      if (scrollTarget) {
        requestAnimationFrame(() => requestAnimationFrame(() => scrollToSection(scrollTarget)));
      }
    }

    function projectsSection() {
      return `
        <section class="page home-section" id="projects">
          <div class="page-meta"><span>/ projects</span></div>
          <h2 class="page-title">Projects</h2>
          <p class="page-lede">A rough timeline of what I've built and where my time went. Some shipped to the public, some lived in evenings between shifts. Either way, this is the work.</p>
          <div class="projects-grid">
            ${projects.map((p, i) => projectCard(p, i)).join('')}
          </div>
        </section>
      `;
    }

    function initScrollSpy() {
      const ids = ['projects', 'socials'];
      const sections = ids.map((id) => document.getElementById(id)).filter(Boolean);
      if (!sections.length) return;
      const links = {};
      ids.forEach((id) => { links[id] = document.querySelector(`#nav a[data-scroll="${id}"]`); });

      const obs = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          Object.values(links).forEach((l) => l && l.classList.remove('active'));
          links[entry.target.id]?.classList.add('active');
        });
      }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });

      sections.forEach((s) => obs.observe(s));
      window._spy = obs;
    }

    function projectCard(p, i) {
      const slides = p.images.map((src, j) => `
        <div class="carousel-slide" data-open="${i}:${j}">
          <img src="${src}" alt="${p.title} — image ${j + 1}" loading="lazy">
        </div>
      `).join('');

      const dots = p.images.map((_, j) => `
        <button class="dot ${j === 0 ? 'active' : ''}" data-go="${i}:${j}" aria-label="Image ${j + 1}"></button>
      `).join('');

      return `
        <article class="project-card" data-project="${i}">
          <div class="carousel">
            <div class="carousel-track" data-track="${i}">${slides}</div>
            ${p.images.length > 1 ? `
              <button class="carousel-nav prev" data-step="${i}:-1" aria-label="Previous image">‹</button>
              <button class="carousel-nav next" data-step="${i}:1" aria-label="Next image">›</button>
              <div class="carousel-counter" data-counter="${i}">1 / ${p.images.length}</div>
              <div class="carousel-dots">${dots}</div>
            ` : ''}
          </div>

          <div class="project-head">
            <span class="project-num">${p.num}</span>
            <span class="project-period">${p.period}</span>
          </div>
          <h3>${p.title}</h3>
          <p class="project-role">${p.role}</p>
          <p class="project-desc">${p.desc}</p>
          <div class="project-tags">${p.tags.map((t) => `<span class="tag">${t}</span>`).join('')}</div>
          <span class="project-status">${p.status}</span>
        </article>
      `;
    }

    function bindCarousels() {
      document.querySelectorAll('[data-step]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const [i, step] = btn.dataset.step.split(':').map(Number);
          moveCarousel(i, step);
        });
      });
      document.querySelectorAll('[data-go]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const [i, j] = btn.dataset.go.split(':').map(Number);
          setCarousel(i, j);
        });
      });
      document.querySelectorAll('[data-open]').forEach((slide) => {
        slide.addEventListener('click', () => {
          const [i, j] = slide.dataset.open.split(':').map(Number);
          openModal(i, j);
        });
      });
    }

    function moveCarousel(i, step) {
      const total = projects[i].images.length;
      const next = (carouselIdx[i] + step + total) % total;
      setCarousel(i, next);
    }

    function setCarousel(i, j) {
      carouselIdx[i] = j;
      const total = projects[i].images.length;
      const track = document.querySelector(`[data-track="${i}"]`);
      if (track) track.style.transform = `translateX(-${j * 100}%)`;

      document
        .querySelector(`[data-project="${i}"]`)
        ?.querySelectorAll('.dot')
        .forEach((d, k) => d.classList.toggle('active', k === j));

      const counter = document.querySelector(`[data-counter="${i}"]`);
      if (counter) counter.textContent = `${j + 1} / ${total}`;
    }

    function socialsSection() {
      return `
        <section class="page home-section" id="socials">
          <div class="page-meta"><span>/ socials</span></div>
          <h2 class="page-title">Socials</h2>
          <p class="page-lede">The fastest ways to reach me. Email's best for anything work-related.</p>
          <div class="socials-list">
            ${socials.map((s) => `
              <a href="${s.url}" class="social-link" target="_blank" rel="noopener">
                <span class="name-wrap">
                  <span>${s.name}</span>
                  <span class="handle">${s.handle}</span>
                </span>
                <span class="arrow">→</span>
              </a>
            `).join('')}
          </div>
          <div class="status-bar">
            <span class="dot-live"></span>
            <span>Open to opportunities · Wisconsin / Remote</span>
          </div>
        </section>
      `;
    }

    function renderStore(root) {
      root.innerHTML = `
        <section class="page">
          <div class="page-meta"><span>/ store</span></div>
          <h2 class="page-title">Store</h2>
          <p class="page-lede">Original fish artwork and apparel. More categories landing over time.</p>
          <div class="store-banner">
            <span class="dot-soon"></span>
            <span>Coming Soon · links go live at launch</span>
          </div>

          <h3 class="store-section-title">Stickers</h3>
          <div class="store-grid">
            ${stickerCard()}
          </div>

          <h3 class="store-section-title">Clothing</h3>
          <div class="store-grid">
            ${clothing.map(clothingCard).join('')}
          </div>
        </section>
      `;
      bindStickers();
      bindClothing();
    }

    function coverHtml(image, label) {
      return `
        <div class="store-cover">
          <img src="${image}" alt="${label}" loading="lazy"
            onerror="this.closest('.store-cover').classList.add('is-empty');">
          <span class="cover-label">${label}</span>
        </div>
      `;
    }

    function stickerCard() {
      const s0 = stickers[0];
      const chips = stickers.map((s, k) =>
        `<button class="color-chip ${k === 0 ? 'active' : ''}" data-sticker="${k}">${s.title}</button>`
      ).join('');
      return `
        <article class="store-card" data-stickers>
          ${coverHtml(s0.image, s0.title)}
          <span class="store-kind">Sticker · 3" × 3"</span>
          <h3 class="sticker-name">${s0.title}</h3>
          <p class="store-desc">Original fish artwork on weatherproof vinyl. Pick your fish below.</p>
          <div class="cloth-colors">${chips}</div>
          <a class="store-cta sticker-buy" href="${s0.url}" target="_blank" rel="noopener">Buy <span class="arrow">→</span></a>
        </article>
      `;
    }

    function bindStickers() {
      const card = document.querySelector('[data-stickers]');
      if (!card) return;
      card.querySelectorAll('[data-sticker]').forEach((chip) => {
        chip.addEventListener('click', () => setSticker(card, +chip.dataset.sticker));
      });
    }

    function setSticker(card, idx) {
      const s = stickers[idx];
      card.querySelectorAll('.color-chip').forEach((c, k) => c.classList.toggle('active', k === idx));
      const cover = card.querySelector('.store-cover');
      cover.classList.remove('is-empty');
      cover.querySelector('img').src = s.image;
      cover.querySelector('.cover-label').textContent = s.title;
      card.querySelector('.sticker-name').textContent = s.title;
      card.querySelector('.sticker-buy').setAttribute('href', s.url);
    }

    function clothingCard(item, i) {
      const c0 = item.colors[0];
      const chips = item.colors.map((c, k) =>
        `<button class="color-chip ${k === 0 ? 'active' : ''}" data-color="${k}">${c.name}</button>`
      ).join('');
      const sizes = c0.sizes.map(([size, url]) =>
        `<a class="size-btn" href="${url}" target="_blank" rel="noopener">${size}</a>`
      ).join('');
      return `
        <article class="store-card" data-cloth="${i}">
          ${coverHtml(c0.image, item.title + ' · ' + c0.name)}
          <span class="store-kind">Apparel</span>
          <h3>${item.title}</h3>
          <p class="store-desc">${item.desc}</p>
          <div class="cloth-colors">${chips}</div>
          <div class="cloth-sizes">${sizes}</div>
          <a class="store-cta" href="${item.productUrl}" target="_blank" rel="noopener">View all options <span class="arrow">→</span></a>
        </article>
      `;
    }

    function bindClothing() {
      document.querySelectorAll('[data-cloth]').forEach((card) => {
        const item = clothing[+card.dataset.cloth];
        card.querySelectorAll('.color-chip').forEach((chip) => {
          chip.addEventListener('click', () => setClothColor(card, item, +chip.dataset.color));
        });
      });
    }

    function setClothColor(card, item, ci) {
      const color = item.colors[ci];
      card.querySelectorAll('.color-chip').forEach((c, k) => c.classList.toggle('active', k === ci));
      const cover = card.querySelector('.store-cover');
      cover.classList.remove('is-empty');
      const img = cover.querySelector('img');
      img.src = color.image;
      cover.querySelector('.cover-label').textContent = `${item.title} · ${color.name}`;
      card.querySelectorAll('.size-btn').forEach((btn, k) => {
        btn.href = color.sizes[k][1];
      });
    }

    function renderApps(root) {
      root.innerHTML = `
        <section class="page">
          <div class="page-meta"><span>/ apps</span></div>
          <h2 class="page-title">Apps</h2>
          <p class="page-lede">Things I'm building and shipping — from a fishing game to open-source tools anyone can run.</p>
          <div class="apps-grid">
            ${apps.map(appCard).join('')}
          </div>
        </section>
      `;
    }

    function appCard(a) {
      const cover = a.image
        ? `<div class="app-cover">
             <img src="${a.image}" alt="${a.title} screenshot" loading="lazy"
               onerror="this.closest('.app-cover').classList.add('placeholder'); this.remove();">
             <span>${a.title}</span>
           </div>`
        : `<div class="app-cover placeholder"><span>${a.title}</span></div>`;
      const tag = a.url ? 'a' : 'div';
      const attrs = a.url ? `href="${a.url}" target="_blank" rel="noopener"` : '';
      return `
        <${tag} class="app-card" ${attrs}>
          ${cover}
          <div class="app-head">
            <h3>${a.title}</h3>
            <span class="app-badge ${a.badgeClass}">${a.badge}</span>
          </div>
          <p class="app-desc">${a.desc}</p>
          <div class="project-tags">${a.tags.map((t) => `<span class="tag">${t}</span>`).join('')}</div>
          <span class="app-cta ${a.url ? '' : 'muted'}">${a.cta}${a.url ? ' <span class="arrow">→</span>' : ''}</span>
        </${tag}>
      `;
    }

    function render404(root) {
      root.innerHTML = `
    <section class="page">
      <div class="page-meta"><span>/ 404</span></div>
      <h2 class="page-title">Lost</h2>
      <p class="page-lede">
        The page you requested doesn't exist.
      </p>

      <a href="/" data-link class="social-link">
        <span class="name-wrap">
          <span>Return Home</span>
        </span>
        <span class="arrow">→</span>
      </a>
    </section>
  `;
    }

    // ---------- Modal ----------
    const modal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-image');
    const modalCounter = document.getElementById('modal-counter');
    let modalState = { i: 0, j: 0 };

    function openModal(i, j) {
      modalState = { i, j };
      updateModal();
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    function modalStep(delta) {
      const total = projects[modalState.i].images.length;
      modalState.j = (modalState.j + delta + total) % total;
      updateModal();
      // sync card carousel underneath
      setCarousel(modalState.i, modalState.j);
    }

    function updateModal() {
      const p = projects[modalState.i];
      modalImg.src = p.images[modalState.j];
      modalImg.alt = `${p.title} — image ${modalState.j + 1}`;
      modalCounter.textContent = `${modalState.j + 1} / ${p.images.length}`;
    }

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    modal.querySelector('.modal-close').addEventListener('click', closeModal);
    modal.querySelector('.modal-nav.prev').addEventListener('click', () => modalStep(-1));
    modal.querySelector('.modal-nav.next').addEventListener('click', () => modalStep(1));

    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      else if (e.key === 'ArrowLeft') modalStep(-1);
      else if (e.key === 'ArrowRight') modalStep(1);
    });

    // ---------- Boot ----------
    render(getPath());
  </script>
</body>

</html>
